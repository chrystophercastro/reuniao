version: '3.8'

# ============================================
# MeetingRoom Manager - Docker Compose
# ============================================
# Uso:
#   docker-compose up -d --build
#   Acesse: http://localhost:8080/reuniao/setup.php
# ============================================

services:
  # ---------- PHP + Apache ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meetingroom-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/reuniao
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=reuniao
      - DB_USER=root
      - DB_PASS=Ca190799@
    networks:
      - meetingroom-net

  # ---------- MySQL ----------
  db:
    image: mysql:8.0
    container_name: meetingroom-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "Ca190799@"
      MYSQL_DATABASE: reuniao
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - meetingroom-db-data:/var/lib/mysql
      - ./database/setup.sql:/docker-entrypoint-initdb.d/01-setup.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pCa190799@"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meetingroom-net

  # ---------- phpMyAdmin (opcional) ----------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: meetingroom-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: "Ca190799@"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meetingroom-net

volumes:
  meetingroom-db-data:
    driver: local

networks:
  meetingroom-net:
    driver: bridge
